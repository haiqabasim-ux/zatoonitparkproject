<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lost Fund Report</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header><div id="lost_fund_header">Lost Fund Report</div></header>
<div class="contener">
    <div class="apply-box">
        <h1>Lost Report Items</h1>
        <form action="">
            <div class="form_contener">
                <div class="form_control">
                    <labil for="first_name"> Item Name </labil>
                    <input id="first_name" name="first_name" placeholder="Enter First Name..."/>
                </div>
                 <div class="form_control">
                    <labil for="last_name">Last Name</labil>
                    <input id="last_name" name="last_name" placeholder="Enter Last Name..."/>
                </div>
                <div class="form_control">
                    <labil for="your_email">Email</labil>
                    <input type="email" id="your_email" name="your_email" placeholder="Enter Email."/>
                </div>
                 <div class="form_control">
                    <labil for="your_email">Catogary</labil>
                    <select id="job_role" name="job_role">
                      <option value="">Select Job Role</option>
                      <option value="frontend">forentend Developer</option>
                      <option value="backend">Backend Developer</option>
                      <option value="full_stack">Full Stack Developer</option>
                      <option value="ulux">Ul Ux Developer</option>
                    </select>
                    </div>
                       <div class="text_control">
                    <labil for="address">Description</labil>
                    <textarea id="address" name="address" row="4" cols="50" placeholder="Enter Address"></textarea>
                </div>
                    <div class="form_control">
                    <labil for="city">City</labil>
                    <input id="city" name="city" placeholder="Enter City"/>
                </div>
                    <div class="form_control">
                    <labil for="pincode">PinCode</labil>
                    <input type="number"  id="pincode" name="pincode" placeholder="Enter Pincode Name..."/>
                </div>
                  <div class="form_control">
                    <labil for="date">Date</labil>
                    <input type="date"  id="date" name="date" value="2026-2-2"/>
                </div>
                  <div class="form_control">
                    <labil for="upload">Select Your CV</labil>
                    <input type="file"  id="upload" name="upload"/>
                </div>
              
            </div>
            <div class="button_control">
                <button type="submit">Apply now </button>
                </div>
        </form>
        
        </div>
</div>
    </body>
    </html>
